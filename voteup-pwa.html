<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VoteUp — Deine Stimme. Echt einfach.</title>
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script>
  tailwind.config = {
    theme: { extend: {
      colors: {
        'vu-black':'#0a0a0f','vu-deep':'#0e0e1a','vu-card':'#13131f',
        'vu-accent':'#5bff8a','vu-blue':'#3de8ff','vu-pink':'#ff5baa',
        'vu-warn':'#ffcc44','vu-white':'#f5f4f0',
      },
      fontFamily: { syne:['Syne','sans-serif'], dm:['DM Sans','sans-serif'] },
    }}
  }
</script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;overflow:hidden}
  body{
    background:#0a0a0f;font-family:'DM Sans',sans-serif;
    display:flex;justify-content:center;align-items:flex-start;
  }
  #root{
    width:100%;max-width:430px;height:100vh;overflow:hidden;
    position:relative;background:#0a0a0f;
    box-shadow:0 0 80px rgba(91,255,138,0.06);
  }
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}
  @keyframes scanLine{0%{top:8%}100%{top:88%}}
  @keyframes spinRing{from{stroke-dashoffset:150}to{stroke-dashoffset:0}}
  .fu{animation:fadeUp .38s ease both}
  .fu2{animation:fadeUp .38s ease .08s both}
  .fu3{animation:fadeUp .38s ease .16s both}
  .dot-pulse{animation:pulseDot 2s infinite}
  .scan{position:absolute;left:0;right:0;height:2px;
    background:linear-gradient(to right,transparent,#5bff8a,transparent);
    animation:scanLine 2s ease-in-out infinite alternate;
    box-shadow:0 0 12px #5bff8a;pointer-events:none}
  ::-webkit-scrollbar{width:0}
  .scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch}
  .press{transition:transform .15s;cursor:pointer}
  .press:active{transform:scale(.96)}
  .tab-bar{
    position:absolute;bottom:0;left:0;right:0;z-index:50;
    background:rgba(10,10,15,.94);backdrop-filter:blur(20px);
    border-top:1px solid rgba(255,255,255,.07);
  }
  .grad-text{
    background:linear-gradient(135deg,#5bff8a,#3de8ff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
  }
  .card{background:#13131f;border:1px solid rgba(255,255,255,.07);border-radius:20px}
  .muted{color:rgba(245,244,240,.45)}
  .modal-overlay{
    position:absolute;inset:0;z-index:60;
    background:rgba(10,10,15,.97);backdrop-filter:blur(24px);
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback} = React;

/* ─────────── MOCK DATA ─────────── */
const TOPICS = [
  {id:'klima',   label:'Klima & Umwelt', emoji:'🌿', color:'#5bff8a'},
  {id:'wirtschaft',label:'Wirtschaft',  emoji:'📈', color:'#3de8ff'},
  {id:'bildung', label:'Bildung',        emoji:'📚', color:'#ff5baa'},
  {id:'gesundheit',label:'Gesundheit',  emoji:'🏥', color:'#ffcc44'},
  {id:'wohnen',  label:'Wohnen & Miete',emoji:'🏠', color:'#a78bfa'},
  {id:'digital', label:'Digitalisierung',emoji:'💻',color:'#3de8ff'},
];
const TOPIC_MAP = Object.fromEntries(TOPICS.map(t=>[t.id,t]));

const NEWS = [
  {id:1,topic:'klima',   title:'Bundesrat beschließt Solarausbau-Paket', summary:'Das neue Paket sieht vor, die Solarkapazität bis 2030 auf 215 GW zu verdreifachen. Kritiker bemängeln fehlende Förderung für Privatdächer.',source:'Bundestag',time:'Vor 2h',isNew:true},
  {id:2,topic:'wohnen',  title:'Mietpreisbremse verlängert bis 2029', summary:'Die Koalition einigt sich auf Verlängerung. Städte ab 100.000 Einwohnern bleiben Mietpreisbremsen-Gebiete. Wohnungsbauverband kritisiert fehlende Anreize.',source:'BMWSB',time:'Vor 5h',isNew:true},
  {id:3,topic:'bildung', title:'Digitalpakt 2.0 — 5 Mrd. Euro für Schulen', summary:'Länder erhalten Bundesgelder für Tablet-Ausstattung, WLAN-Infrastruktur und KI-Lernplattformen. Umsetzung soll bis 2027 erfolgen.',source:'KMK',time:'Vor 1 Tag',isNew:false},
  {id:4,topic:'wirtschaft',title:'Mindestlohn steigt auf 15 Euro', summary:'Die Mindestlohnkommission empfiehlt 15 Euro ab 2026. Arbeitgeberverbände warnen vor Stellenabbau in der Gastronomie.',source:'BMAS',time:'Vor 2 Tagen',isNew:false},
  {id:5,topic:'gesundheit',title:'Kassenbeiträge 2026: +0,8 Beitragspunkte', summary:'GKV rechnet mit steigendem Defizit. Gesundheitsminister prüft Strukturreform. Privatversicherte von Erhöhung nicht betroffen.',source:'BMG',time:'Vor 3 Tagen',isNew:false},
  {id:6,topic:'digital', title:'eIDAS-2.0 Wallet ab 2026 Pflicht für EU', summary:'Alle EU-Staaten müssen bis Ende 2026 eine digitale Identitäts-Wallet anbieten. Deutschland plant Integration mit BundID.',source:'EU-Kommission',time:'Vor 4 Tagen',isNew:false},
  {id:7,topic:'klima',   title:'CO₂-Preis steigt auf 55 Euro pro Tonne', summary:'Der nationale CO₂-Preis erhöht sich planmäßig. Tankstellen-Preise steigen um ca. 3 Cent pro Liter. Klimageld bleibt umstritten.',source:'UBA',time:'Vor 5 Tagen',isNew:false},
  {id:8,topic:'wirtschaft',title:'Bundeshaushalt 2026: Einigung nach Marathon', summary:'Nach wochenlangen Verhandlungen beschließt die Koalition einen Haushalt mit Investitionsschwerpunkt auf Infrastruktur und KI.',source:'BMF',time:'Vor 6 Tagen',isNew:false},
];

const BALLOTS = [
  {id:1,title:'Solaranlagen auf allen Neubauten',question:'Sollen neue Wohngebäude ab 2026 verpflichtend mit Solaranlagen ausgestattet werden?',topic:'klima',color:'#5bff8a',emoji:'🌿',yes:14823,no:6341,end:'30. Apr 2026',region:'Bundesweit'},
  {id:2,title:'Mietpreisdeckel für Großstädte',question:'Sollen Mieten in Städten ab 500.000 Einwohnern für 5 Jahre eingefroren werden?',topic:'wohnen',color:'#a78bfa',emoji:'🏠',yes:9241,no:11882,end:'15. Mai 2026',region:'Städte 500k+'},
  {id:3,title:'Tempo 30 als Standard',question:'Soll Tempo 30 als Standard-Höchstgeschwindigkeit in Wohngebieten gelten?',topic:'wirtschaft',color:'#3de8ff',emoji:'🚗',yes:7109,no:13290,end:'1. Jun 2026',region:'Kommunal'},
];

const PARTY_CARDS = [
  {id:1,topic:'Klima',party:'SPD',bg:'#e3000f',fg:'#fff',pos:'Klimaneutralität bis 2045. Förderung von Wärmepumpen und Gebäudesanierung durch staatliche Zuschüsse. CO₂-Preis als Lenkungsinstrument beibehalten.',score:68},
  {id:2,topic:'Klima',party:'CDU/CSU',bg:'#1a1a1a',fg:'#fff',pos:'Technologieoffenheit statt Verbote. Kernkraft als Brückentechnologie erneut prüfen. CO₂-Emissionsmarkt statt sektorspezifischer Eingriffe.',score:44},
  {id:3,topic:'Klima',party:'Grüne',bg:'#1fa12d',fg:'#fff',pos:'Kohleausstieg 2030, 100% Erneuerbare bis 2035. Verbrenner-Aus 2027. Klimageld für sozial Schwache als direkten CO₂-Ausgleich.',score:92},
  {id:4,topic:'Klima',party:'FDP',bg:'#f5d400',fg:'#000',pos:'Emissionshandel als einziges sinnvolles Klimainstrument. Keine sektorspezifischen Verbote. Innovation und Marktmechanismen statt Regulierung.',score:37},
  {id:5,topic:'Wohnen',party:'SPD',bg:'#e3000f',fg:'#fff',pos:'Mietpreisbremse verlängern und verschärfen. 100.000 neue Sozialwohnungen pro Jahr. Wohnungsgemeinnützigkeit reaktivieren.',score:76},
  {id:6,topic:'Wohnen',party:'Grüne',bg:'#1fa12d',fg:'#fff',pos:'Spekulation mit Wohnraum stoppen. Leerstandsabgabe für ungenutzten Wohnraum. Deutlich mehr Genossenschaftswohnungen fördern.',score:73},
];

/* ─────────── SHARED UI ─────────── */
const Logo = ({size='md'}) => (
  <div className={`font-syne font-black flex items-center gap-2 ${size==='lg'?'text-3xl':'text-xl'}`}>
    <div className="w-2 h-2 rounded-full dot-pulse" style={{background:'#5bff8a'}}/>
    <span style={{color:'#f5f4f0'}}>Vote</span>
    <span className="grad-text">Up</span>
  </div>
);

const Badge = ({label,color='#5bff8a'}) => (
  <span className="text-xs font-syne font-semibold px-3 py-1 rounded-full"
    style={{color,border:`1px solid ${color}40`,background:`${color}10`,letterSpacing:'0.06em'}}>
    {label}
  </span>
);

const Btn = ({children,onClick,variant='primary',full,style:sx}) => {
  const base = "press py-3 px-5 rounded-2xl font-syne font-bold text-sm transition-all";
  const styles = {
    primary:{background:'linear-gradient(135deg,#5bff8a,#3de8ff)',color:'#0a0a0f',boxShadow:'0 0 30px rgba(91,255,138,.22)'},
    ghost:{background:'rgba(255,255,255,.05)',color:'rgba(245,244,240,.7)',border:'1px solid rgba(255,255,255,.09)'},
    danger:{background:'rgba(255,91,170,.1)',color:'#ff5baa',border:'1px solid rgba(255,91,170,.25)'},
    success:{background:'rgba(91,255,138,.1)',color:'#5bff8a',border:'1px solid rgba(91,255,138,.25)'},
  };
  return (
    <button className={`${base} ${full?'w-full':''}`} onClick={onClick}
      style={{...styles[variant],...sx}}>
      {children}
    </button>
  );
};

/* ─────────── ONBOARDING ─────────── */
function Onboarding({onComplete}) {
  const [step,setStep] = useState(0);
  const [sel,setSel] = useState(new Set());

  const toggle = id => setSel(p=>{const n=new Set(p); n.has(id)?n.delete(id):n.add(id); return n;});

  if(step===0) return (
    <div className="flex flex-col items-center justify-center h-full px-6 text-center"
      style={{background:'linear-gradient(180deg,#0a0a0f 0%,#0d1a12 100%)'}}>
      <div className="mb-6 fu"><div className="text-7xl mb-5">🗳️</div><Logo size="lg"/></div>
      <h1 className="font-syne font-black text-3xl fu2 leading-tight mb-3" style={{color:'#f5f4f0',letterSpacing:'-.03em'}}>
        Deine Stimme.<br/><span className="grad-text">Echt einfach.</span>
      </h1>
      <p className="text-sm leading-relaxed mb-6 fu3 muted">
        Politische Bildung in 80 Wörtern.<br/>Abstimmungen in 90 Sekunden.<br/>Anonym durch Zero-Knowledge-Proof.
      </p>
      <div className="flex flex-wrap justify-center gap-2 mb-6 fu3">
        <Badge label="eIDAS-2.0 Konform"/>
        <Badge label="DSGVO · Zero PII" color="#3de8ff"/>
        <Badge label="ZKP Anonym" color="#ff5baa"/>
      </div>
      <Btn full onClick={()=>setStep(1)} style={{fontSize:'1rem',padding:'1rem'}}>
        Jetzt starten →
      </Btn>
    </div>
  );

  const canProceed = sel.size >= 2;
  return (
    <div className="flex flex-col h-full px-5 pt-12 pb-6">
      <div className="mb-5 fu">
        <p className="text-xs font-syne font-bold tracking-widest uppercase mb-1" style={{color:'#5bff8a'}}>Personalisierung</p>
        <h2 className="font-syne font-black text-2xl" style={{color:'#f5f4f0',letterSpacing:'-.03em'}}>Was interessiert dich?</h2>
        <p className="text-sm mt-1 muted">Wähle mindestens 2 Themen für deinen Feed.</p>
      </div>
      <div className="grid grid-cols-2 gap-3 flex-1 fu2">
        {TOPICS.map(t=>{
          const on = sel.has(t.id);
          return (
            <button key={t.id} onClick={()=>toggle(t.id)}
              className="press rounded-2xl p-4 text-left border transition-all duration-200"
              style={{
                background: on?`${t.color}18`:'#13131f',
                borderColor: on?`${t.color}55`:'rgba(255,255,255,.07)',
              }}>
              <div className="text-3xl mb-2">{t.emoji}</div>
              <div className="font-syne font-bold text-sm" style={{color:on?t.color:'#f5f4f0'}}>{t.label}</div>
              {on&&<div className="text-xs mt-0.5 font-semibold" style={{color:`${t.color}88`}}>Ausgewählt ✓</div>}
            </button>
          );
        })}
      </div>
      <button onClick={()=>canProceed?onComplete([...sel]):null}
        className="press mt-4 w-full py-4 rounded-2xl font-syne font-black text-base transition-all duration-300"
        style={{
          background: canProceed?'linear-gradient(135deg,#5bff8a,#3de8ff)':'rgba(255,255,255,.06)',
          color: canProceed?'#0a0a0f':'rgba(245,244,240,.25)',
          boxShadow: canProceed?'0 0 30px rgba(91,255,138,.22)':'none',
        }}>
        {canProceed?`App starten (${sel.size} Themen) →`:`Noch ${2-sel.size} auswählen`}
      </button>
    </div>
  );
}

/* ─────────── FEED ─────────── */
function Feed({topics}) {
  const [filter,setFilter] = useState('all');
  const items = NEWS.filter(n=>topics.includes(n.topic)&&(filter==='all'||n.topic===filter));

  return (
    <div className="flex flex-col h-full">
      <div className="px-5 pt-10 pb-3" style={{background:'#0a0a0f'}}>
        <Logo/>
        <p className="text-xs mt-0.5 font-syne tracking-widest uppercase" style={{color:'rgba(245,244,240,.25)'}}>
          Dein Feed · Kein Engagement-Algorithmus
        </p>
      </div>
      <div className="flex gap-2 px-5 pb-3 overflow-x-auto" style={{scrollbarWidth:'none'}}>
        {['all',...topics].map(id=>{
          const t = TOPIC_MAP[id];
          const color = id==='all'?'#5bff8a':t?.color;
          const active = filter===id;
          return (
            <button key={id} onClick={()=>setFilter(id)}
              className="press flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-syne font-semibold border transition-all duration-200"
              style={{
                color:active?color:'rgba(245,244,240,.35)',
                background:active?`${color}18`:'rgba(255,255,255,.03)',
                borderColor:active?`${color}50`:'rgba(255,255,255,.08)',
              }}>
              {id==='all'?'Alle':`${t?.emoji} ${t?.label}`}
            </button>
          );
        })}
      </div>
      <div className="flex-1 scrollable px-5 pb-24 space-y-3">
        {items.length===0?(
          <div className="flex flex-col items-center justify-center h-32 text-center">
            <div className="text-3xl mb-2">📭</div>
            <p className="text-sm muted">Keine Artikel für dieses Thema</p>
          </div>
        ):items.map((a,i)=>{
          const t = TOPIC_MAP[a.topic];
          return (
            <div key={a.id} className="card p-4 fu" style={{animationDelay:`${i*.05}s`}}>
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <span className="text-xs font-syne font-bold px-2 py-0.5 rounded-full"
                  style={{background:`${t.color}20`,color:t.color}}>
                  {t.emoji} {t.label}
                </span>
                {a.isNew&&<span className="text-xs font-syne font-bold px-2 py-0.5 rounded-full"
                  style={{background:'rgba(255,91,170,.15)',color:'#ff5baa'}}>NEU</span>}
                <span className="ml-auto text-xs" style={{color:'rgba(245,244,240,.28)'}}>{a.time}</span>
              </div>
              <h3 className="font-syne font-bold text-sm leading-snug mb-1" style={{color:'#f5f4f0'}}>{a.title}</h3>
              <p className="text-xs leading-relaxed muted">{a.summary}</p>
              <div className="mt-2 flex justify-between items-center">
                <span className="text-xs" style={{color:'rgba(245,244,240,.25)'}}>{a.source}</span>
                <span className="text-xs font-syne font-semibold press" style={{color:t.color}}>Mehr lesen →</span>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────── ENTDECKEN ─────────── */
function Entdecken() {
  const [idx,setIdx] = useState(0);
  const [fading,setFading] = useState(false);
  const [dir,setDir] = useState(0);

  const go = (d) => {
    if(fading) return;
    setDir(d); setFading(true);
    setTimeout(()=>{setIdx(i=>(i+1)%PARTY_CARDS.length);setFading(false);setDir(0);},280);
  };

  const c = PARTY_CARDS[idx];
  const scoreColor = c.score>=70?'#5bff8a':c.score>=50?'#ffcc44':'#ff5baa';

  return (
    <div className="flex flex-col h-full">
      <div className="px-5 pt-10 pb-4">
        <p className="text-xs font-syne font-bold tracking-widest uppercase mb-1" style={{color:'#3de8ff'}}>Entdecken</p>
        <h2 className="font-syne font-black text-xl" style={{color:'#f5f4f0',letterSpacing:'-.02em'}}>Wer steht wofür?</h2>
        <p className="text-xs mt-1 muted">Nur Abstimmungsverhalten — keine redaktionellen Meinungen.</p>
      </div>
      <div className="flex-1 px-5 flex flex-col justify-center pb-28">
        {/* Card */}
        <div className="card p-5 transition-all duration-280"
          style={{
            opacity:fading?0:1,
            transform:fading?(dir>0?'translateX(50px) rotate(3deg)':'translateX(-50px) rotate(-3deg)'):'none',
          }}>
          {/* Header */}
          <div className="flex items-center gap-3 mb-4">
            <div className="w-11 h-11 rounded-xl flex items-center justify-center font-syne font-black text-sm"
              style={{background:c.bg,color:c.fg}}>{c.party.slice(0,2)}</div>
            <div>
              <div className="font-syne font-black text-sm" style={{color:'#f5f4f0'}}>{c.party}</div>
              <div className="text-xs muted">Thema: {c.topic}</div>
            </div>
            <div className="ml-auto text-right">
              <div className="font-syne font-black text-xl" style={{color:scoreColor}}>{c.score}</div>
              <div className="text-xs muted">Score</div>
            </div>
          </div>
          {/* Bar */}
          <div className="h-1.5 rounded-full mb-4" style={{background:'rgba(255,255,255,.07)'}}>
            <div className="h-full rounded-full transition-all duration-500" style={{width:`${c.score}%`,background:scoreColor}}/>
          </div>
          <p className="text-sm leading-relaxed" style={{color:'rgba(245,244,240,.7)'}}>{c.pos}</p>
          {/* Dots */}
          <div className="flex justify-center gap-1 mt-5">
            {PARTY_CARDS.map((_,i)=>(
              <div key={i} className="h-1 rounded-full transition-all duration-200"
                style={{width:i===idx?'18px':'6px',background:i===idx?'#5bff8a':'rgba(255,255,255,.15)'}}/>
            ))}
          </div>
        </div>
        {/* Buttons */}
        <div className="flex gap-3 mt-4">
          <Btn full variant="danger" onClick={()=>go(-1)}>← Überspringen</Btn>
          <Btn full variant="success" onClick={()=>go(1)}>Nächste →</Btn>
        </div>
        <p className="text-center text-xs mt-3 muted">{idx+1} / {PARTY_CARDS.length} Karten</p>
      </div>
    </div>
  );
}

/* ─────────── VERIFY MODAL ─────────── */
function VerifyModal({onClose,onSuccess}) {
  const [step,setStep] = useState(0);

  useEffect(()=>{
    if(step===1){const t=setTimeout(()=>setStep(2),3200);return()=>clearTimeout(t);}
    if(step===2){const t=setTimeout(()=>onSuccess(),1400);return()=>clearTimeout(t);}
  },[step]);

  return (
    <div className="modal-overlay flex flex-col items-center justify-center px-6 text-center">
      {step===0&&(
        <div className="fu w-full">
          <div className="text-6xl mb-4">🔐</div>
          <h2 className="font-syne font-black text-2xl mb-2" style={{color:'#f5f4f0',letterSpacing:'-.03em'}}>
            Verifizierung<br/>erforderlich
          </h2>
          <p className="text-sm muted leading-relaxed mb-4">
            Wir prüfen deine Wahlberechtigung via eID.<br/>
            <strong style={{color:'#f5f4f0'}}>Keine persönlichen Daten werden gespeichert.</strong>
          </p>
          <div className="rounded-2xl p-4 text-left mb-5"
            style={{background:'rgba(91,255,138,.05)',border:'1px solid rgba(91,255,138,.2)'}}>
            <p className="text-xs font-syne font-bold mb-1" style={{color:'#5bff8a'}}>⚡ Zero-Knowledge-Proof</p>
            <p className="text-xs muted leading-relaxed">
              Deine Identität wird kryptographisch bestätigt, ohne Name, Adresse oder Ausweisnummer zu persistieren.
            </p>
          </div>
          <Btn full onClick={()=>setStep(1)} style={{padding:'1rem',fontSize:'1rem',marginBottom:'12px'}}>
            📲 Mit eID verifizieren
          </Btn>
          <button onClick={onClose} className="text-sm muted press" style={{padding:'8px'}}>Abbrechen</button>
        </div>
      )}
      {step===1&&(
        <div className="fu">
          <div className="relative w-44 h-64 mx-auto mb-6 rounded-2xl overflow-hidden"
            style={{background:'#0e0e1a',border:'2px solid rgba(91,255,138,.4)'}}>
            <div className="scan"/>
            <div className="absolute inset-0 flex items-center justify-center text-5xl">🪪</div>
            {[['top-2 left-2','border-t-2 border-l-2'],['top-2 right-2','border-t-2 border-r-2'],
              ['bottom-2 left-2','border-b-2 border-l-2'],['bottom-2 right-2','border-b-2 border-r-2']
            ].map(([p,c],i)=>(
              <div key={i} className={`absolute w-5 h-5 ${p} ${c}`} style={{borderColor:'#5bff8a'}}/>
            ))}
          </div>
          <p className="font-syne font-black text-xl mb-1" style={{color:'#f5f4f0'}}>Ausweis wird gelesen…</p>
          <p className="text-sm muted mb-4">Halte deinen Personalausweis an die NFC-Antenne</p>
          <div className="flex justify-center gap-2">
            {[0,1,2].map(i=>(
              <div key={i} className="w-2 h-2 rounded-full" style={{
                background:'#5bff8a',
                animation:`pulseDot 1.2s infinite ${i*.4}s`
              }}/>
            ))}
          </div>
        </div>
      )}
      {step===2&&(
        <div className="fu">
          <div className="w-20 h-20 rounded-full flex items-center justify-center text-4xl mx-auto mb-4"
            style={{background:'rgba(91,255,138,.12)',border:'2px solid rgba(91,255,138,.35)'}}>✅</div>
          <p className="font-syne font-black text-2xl mb-2" style={{color:'#f5f4f0'}}>Verifiziert!</p>
          <p className="text-sm muted">Keine Identitätsdaten gespeichert.</p>
        </div>
      )}
    </div>
  );
}

/* ─────────── ABSTIMMEN ─────────── */
function Abstimmen({verified,setVerified,voted,setVoted}) {
  const [showVerify,setShowVerify] = useState(false);
  const [pending,setPending] = useState(null);
  const [choices,setChoices] = useState({});

  const attempt = (id,choice)=>{
    if(!verified){setPending({id,choice});setShowVerify(true);}
    else cast(id,choice);
  };
  const cast = (id,choice)=>{
    setVoted(p=>new Set([...p,id]));
    setChoices(p=>({...p,[id]:choice}));
  };
  const onVerified = ()=>{
    setVerified(true);setShowVerify(false);
    if(pending){cast(pending.id,pending.choice);setPending(null);}
  };

  return (
    <div className="flex flex-col h-full">
      {showVerify&&<VerifyModal onClose={()=>{setShowVerify(false);setPending(null);}} onSuccess={onVerified}/>}
      <div className="px-5 pt-10 pb-4 flex items-start justify-between">
        <div>
          <p className="text-xs font-syne font-bold tracking-widest uppercase mb-1" style={{color:'#ff5baa'}}>Abstimmen</p>
          <h2 className="font-syne font-black text-xl" style={{color:'#f5f4f0',letterSpacing:'-.02em'}}>Aktive Abstimmungen</h2>
        </div>
        <div className="flex items-center gap-1.5 px-3 py-1.5 rounded-full mt-1"
          style={verified
            ?{background:'rgba(91,255,138,.1)',border:'1px solid rgba(91,255,138,.3)'}
            :{background:'rgba(255,204,68,.1)',border:'1px solid rgba(255,204,68,.3)'}}>
          <div className="w-1.5 h-1.5 rounded-full dot-pulse"
            style={{background:verified?'#5bff8a':'#ffcc44'}}/>
          <span className="text-xs font-syne font-bold" style={{color:verified?'#5bff8a':'#ffcc44'}}>
            {verified?'Verifiziert':'Nicht verifiziert'}
          </span>
        </div>
      </div>
      <div className="flex-1 scrollable px-5 pb-24 space-y-4">
        {BALLOTS.map((b,i)=>{
          const hasVoted = voted.has(b.id);
          const mc = choices[b.id];
          const total = b.yes+b.no+(hasVoted?1:0);
          const yp = Math.round(((b.yes+(mc==='yes'?1:0))/total)*100);
          return (
            <div key={b.id} className="rounded-3xl overflow-hidden fu"
              style={{background:'#13131f',border:`1px solid ${hasVoted?b.color+'45':'rgba(255,255,255,.07)'}`,animationDelay:`${i*.08}s`}}>
              <div className="p-4 pb-2">
                <div className="flex items-center gap-2 mb-2 flex-wrap">
                  <span className="text-xs font-syne font-bold px-2 py-0.5 rounded-full"
                    style={{background:`${b.color}20`,color:b.color}}>{b.emoji} {b.region}</span>
                  <span className="ml-auto text-xs" style={{color:'rgba(245,244,240,.28)'}}>bis {b.end}</span>
                </div>
                <h3 className="font-syne font-black text-sm leading-snug mb-1" style={{color:'#f5f4f0'}}>{b.title}</h3>
                <p className="text-xs leading-relaxed muted">{b.question}</p>
              </div>
              {/* Result bar */}
              <div className="px-4 pb-3">
                <div className="flex h-1.5 rounded-full overflow-hidden mb-1.5"
                  style={{background:'rgba(255,255,255,.06)'}}>
                  <div style={{width:`${yp}%`,background:'#5bff8a',transition:'width .5s ease'}}/>
                  <div style={{flex:1,background:'#ff5baa'}}/>
                </div>
                <div className="flex justify-between text-xs">
                  <span style={{color:'#5bff8a',fontWeight:600}}>{yp}% Ja</span>
                  <span style={{color:'rgba(245,244,240,.3)'}}>{(b.yes+b.no).toLocaleString('de-DE')} Stimmen</span>
                  <span style={{color:'#ff5baa',fontWeight:600}}>{100-yp}% Nein</span>
                </div>
              </div>
              <div className="px-4 pb-4">
                {hasVoted?(
                  <div className="text-center py-2 rounded-xl text-xs font-syne font-bold"
                    style={{background:`${b.color}12`,color:b.color,border:`1px solid ${b.color}30`}}>
                    ✓ Du hast mit <strong>{mc==='yes'?'JA':'NEIN'}</strong> gestimmt
                  </div>
                ):(
                  <div className="grid grid-cols-2 gap-2">
                    <Btn variant="success" onClick={()=>attempt(b.id,'yes')}>✓ Ja</Btn>
                    <Btn variant="danger" onClick={()=>attempt(b.id,'no')}>✗ Nein</Btn>
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ─────────── PROFIL ─────────── */
function Profil({topics,voted}) {
  const score = Math.min(100,voted.size*28+topics.length*8+5);
  const circ = 2*Math.PI*24;

  return (
    <div className="flex flex-col h-full">
      <div className="px-5 pt-10 pb-4">
        <p className="text-xs font-syne font-bold tracking-widest uppercase mb-1" style={{color:'#a78bfa'}}>Profil</p>
        <h2 className="font-syne font-black text-xl" style={{color:'#f5f4f0',letterSpacing:'-.02em'}}>Dein Civic Footprint</h2>
      </div>
      <div className="flex-1 scrollable px-5 pb-24 space-y-4">
        {/* Score */}
        <div className="rounded-3xl p-5"
          style={{background:'linear-gradient(160deg,#131325,#0e1a18)',border:'1px solid rgba(91,255,138,.18)'}}>
          <div className="flex items-center gap-4">
            <div className="relative w-16 h-16 flex-shrink-0">
              <svg className="w-16 h-16 -rotate-90" viewBox="0 0 60 60">
                <circle cx="30" cy="30" r="24" fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="5"/>
                <circle cx="30" cy="30" r="24" fill="none" stroke="#5bff8a" strokeWidth="5"
                  strokeDasharray={`${circ*score/100} ${circ}`} strokeLinecap="round"
                  style={{transition:'stroke-dasharray .6s ease'}}/>
              </svg>
              <div className="absolute inset-0 flex items-center justify-center font-syne font-black text-sm" style={{color:'#5bff8a'}}>{score}</div>
            </div>
            <div>
              <div className="font-syne font-black text-lg" style={{color:'#f5f4f0'}}>Civic Score</div>
              <div className="text-xs muted">{voted.size} Abstimmung{voted.size!==1?'en':''} · {topics.length} Themen</div>
              <div className="text-xs mt-1 font-semibold" style={{color:'#5bff8a'}}>
                {score===0?'Starte jetzt!':score<40?'Gut angefangen!':score<70?'Aktiv dabei 🌿':'Demokrat des Jahres 🏆'}
              </div>
            </div>
          </div>
        </div>
        {/* Topics */}
        <div className="card p-4">
          <p className="text-xs font-syne font-bold muted tracking-widest uppercase mb-3">Meine Themen</p>
          <div className="flex flex-wrap gap-2">
            {topics.map(id=>{const t=TOPIC_MAP[id];return t?(
              <span key={id} className="px-3 py-1.5 rounded-full text-xs font-syne font-bold"
                style={{background:`${t.color}15`,color:t.color,border:`1px solid ${t.color}35`}}>
                {t.emoji} {t.label}
              </span>
            ):null;})}
          </div>
        </div>
        {/* Data Transparency */}
        <div className="card p-4">
          <p className="text-xs font-syne font-bold muted tracking-widest uppercase mb-3">Datentransparenz</p>
          {[
            {label:'Abstimmungsdaten',value:'Keine (ZKP)',color:'#5bff8a'},
            {label:'Persönliche ID-Daten',value:'Nicht gespeichert',color:'#5bff8a'},
            {label:'Analytics',value:'Anonym, aggregiert',color:'#3de8ff'},
            {label:'Drittanbieter-Tracking',value:'Keines',color:'#5bff8a'},
          ].map(r=>(
            <div key={r.label} className="flex justify-between items-center py-2.5 border-b last:border-0"
              style={{borderColor:'rgba(255,255,255,.05)'}}>
              <span className="text-xs muted">{r.label}</span>
              <span className="text-xs font-syne font-bold" style={{color:r.color}}>{r.value}</span>
            </div>
          ))}
        </div>
        {/* Badges */}
        <div className="flex flex-wrap gap-2 pb-1">
          {[['eIDAS-2.0','#5bff8a'],['DSGVO-Konform','#3de8ff'],['ZKP Anonym','#ff5baa'],['Open Source','#ffcc44']].map(([l,c])=>(
            <Badge key={l} label={l} color={c}/>
          ))}
        </div>
        <p className="text-xs text-center pb-2" style={{color:'rgba(245,244,240,.18)'}}>
          VoteUp v1.0 · Strikt überparteilich · © 2026 VoteUp GmbH i.Gr.
        </p>
      </div>
    </div>
  );
}

/* ─────────── BOTTOM NAV ─────────── */
function TabBar({tab,setTab,unvoted}) {
  const tabs=[
    {id:'feed',emoji:'🏠',label:'Feed'},
    {id:'entdecken',emoji:'🔍',label:'Entdecken'},
    {id:'abstimmen',emoji:'🗳️',label:'Abstimmen',badge:unvoted},
    {id:'profil',emoji:'👤',label:'Profil'},
  ];
  return (
    <div className="tab-bar flex" style={{paddingBottom:'env(safe-area-inset-bottom,6px)'}}>
      {tabs.map(t=>{
        const active = tab===t.id;
        return (
          <button key={t.id} onClick={()=>setTab(t.id)}
            className="press flex-1 flex flex-col items-center gap-0.5 py-2.5 relative"
            style={{color:active?'#5bff8a':'rgba(245,244,240,.28)'}}>
            {active&&<div className="absolute top-0 left-1/2 -translate-x-1/2 w-6 h-0.5 rounded-full" style={{background:'#5bff8a'}}/>}
            <div className="relative">
              <span className="text-xl leading-none">{t.emoji}</span>
              {t.badge>0&&(
                <span className="absolute -top-1 -right-2 w-4 h-4 rounded-full flex items-center justify-center font-syne font-black"
                  style={{background:'#ff5baa',color:'#fff',fontSize:'0.55rem'}}>{t.badge}</span>
              )}
            </div>
            <span className="font-syne font-semibold" style={{fontSize:'0.58rem',letterSpacing:'0.06em'}}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

/* ─────────── APP ─────────── */
function App() {
  const [screen,setScreen] = useState('onboarding');
  const [topics,setTopics] = useState([]);
  const [tab,setTab] = useState('feed');
  const [verified,setVerified] = useState(false);
  const [voted,setVoted] = useState(new Set());

  const done = (t) => {setTopics(t);setScreen('app');};
  const unvoted = BALLOTS.length - voted.size;

  return (
    <div style={{height:'100vh',overflow:'hidden',background:'#0a0a0f',position:'relative'}}>
      {screen==='onboarding'
        ?<Onboarding onComplete={done}/>
        :<>
          <div style={{height:'100%',overflow:'hidden'}}>
            {tab==='feed'&&<Feed topics={topics}/>}
            {tab==='entdecken'&&<Entdecken/>}
            {tab==='abstimmen'&&<Abstimmen verified={verified} setVerified={setVerified} voted={voted} setVoted={setVoted}/>}
            {tab==='profil'&&<Profil topics={topics} voted={voted}/>}
          </div>
          <TabBar tab={tab} setTab={setTab} unvoted={unvoted}/>
        </>
      }
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
