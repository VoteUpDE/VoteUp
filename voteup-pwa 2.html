<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: { extend: {
    colors: {
      'vu-black':'#0a0a0f','vu-deep':'#0e0e1a','vu-card':'#13131f',
      'vu-accent':'#5bff8a','vu-blue':'#3de8ff','vu-pink':'#ff5baa',
      'vu-warn':'#ffcc44','vu-white':'#f5f4f0',

    fontFamily: { syne:['Syne','sans-serif'], dm:['DM Sans','sans-serif'] },

<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body,#root{height:100%;overflow:hidden}
  body{
    background:#0a0a0f;font-family:'DM Sans',sans-serif;
    display:flex;justify-content:center;align-items:flex-start;
    -webkit-font-smoothing:antialiased;
  }
  #root{
    width:100%;max-width:430px;height:100vh;overflow:hidden;
    position:relative;background:#0a0a0f;
    box-shadow:0 0 80px rgba(91,255,138,.06);
  }
  /* FIX UI-3: Globale Keyboard-Navigation */
  *:focus-visible{outline:2px solid #5bff8a;outline-offset:2px;border-radius:4px}
  @keyframes pulseDot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}
  @keyframes scanLine{0%{top:8%}100%{top:88%}}
  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  .dot-pulse{animation:pulseDot 2s infinite}
  .scan{position:absolute;left:0;right:0;height:2px;pointer-events:none;
    background:linear-gradient(to right,transparent,#5bff8a,transparent);
    animation:scanLine 2s ease-in-out infinite alternate;
    box-shadow:0 0 12px #5bff8a}
  .fu {animation:fadeUp .38s ease both}
  .fu2{animation:fadeUp .38s ease .08s both}
  .fu3{animation:fadeUp .38s ease .16s both}
  ::-webkit-scrollbar{width:0}
  .scrollable{overflow-y:auto;-webkit-overflow-scrolling:touch}
  .press{transition:transform .15s;cursor:pointer}
  .press:active{transform:scale(.96)}
  .tab-bar{
    position:absolute;bottom:0;left:0;right:0;z-index:50;
    background:rgba(10,10,15,.94);backdrop-filter:blur(20px);
    border-top:1px solid rgba(255,255,255,.07);
  }
  .grad-text{
    background:linear-gradient(135deg,#5bff8a,#3de8ff);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text
  }
  .card{background:#13131f;border:1px solid rgba(255,255,255,.07);border-radius:20px}
  .modal-overlay{
    position:absolute;inset:0;z-index:60;
    background:rgba(10,10,15,.97);backdrop-filter:blur(24px);
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:1.5rem;text-align:center;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">

const {useState,useEffect,useRef,useCallback,useMemo} = React;

/* ── DATA ── */

   summary:'Nach wochenlangen Verhandlungen beschließt die Koalition einen Haushalt mit Schwerpunkt auf Infrastruktur und KI.'},
];

const BALLOTS = [
  {id:1,topic:'klima',color:'#5bff8a',emoji:'🌿',yes:14823,no:6341,
   region:'Bundesweit',end:'30. Apr 2026',
   title:'Solaranlagen auf allen Neubauten',
   question:'Sollen neue Wohngebäude ab 2026 verpflichtend mit Solaranlagen ausgestattet werden?'},
  {id:2,topic:'wohnen',color:'#a78bfa',emoji:'🏠',yes:9241,no:11882,
   region:'Städte 500k+',end:'15. Mai 2026',
   title:'Mietpreisdeckel für Großstädte',

  {id:3,topic:'wirtschaft',color:'#3de8ff',emoji:'🚗',yes:7109,no:13290,
   region:'Kommunal',end:'1. Jun 2026',
   title:'Tempo 30 als Standard',

const PARTY_CARDS = [
  {id:1,topic:'Klima',party:'SPD',bg:'#e3000f',fg:'#fff',score:68,
   pos:'Klimaneutralität bis 2045. Förderung von Wärmepumpen und Gebäudesanierung durch staatliche Zuschüsse. CO₂-Preis als Lenkungsinstrument beibehalten.'},

/* ── SHARED UI ── */
const Logo = ({size='md'}) => (
  <div className={`font-syne font-black flex items-center gap-2 ${size==='lg'?'text-3xl':'text-xl'}`}>
    <div className="w-2 h-2 rounded-full dot-pulse" style={{background:'#5bff8a'}} aria-hidden="true"/>
    <span style={{color:'#f5f4f0'}}>Vote</span><span className="grad-text">Up</span>
  </div>
);

const Badge = ({label,color='#5bff8a'}) => (
  <span className="text-xs font-syne font-semibold px-3 py-1 rounded-full"
    style={{color,border:`1px solid ${color}40`,background:`${color}10`,letterSpacing:'.06em'}}>
    {label}
  </span>
);

const BSTYLES = {
  primary:{background:'linear-gradient(135deg,#5bff8a,#3de8ff)',color:'#0a0a0f',boxShadow:'0 0 30px rgba(91,255,138,.22)'},
  ghost:  {background:'rgba(255,255,255,.05)',color:'rgba(245,244,240,.7)',border:'1px solid rgba(255,255,255,.09)'},
  danger: {background:'rgba(255,91,170,.1)',color:'#ff5baa',border:'1px solid rgba(255,91,170,.25)'},
  success:{background:'rgba(91,255,138,.1)',color:'#5bff8a',border:'1px solid rgba(91,255,138,.25)'},
};
const Btn = ({children,onClick,variant='primary',full,style:sx,disabled}) => (
  <button onClick={onClick} disabled={disabled}
    className={`press py-3 px-5 rounded-2xl font-syne font-bold text-sm${full?' w-full':''}`}
    style={{...BSTYLES[variant],...(disabled?{opacity:.4,cursor:'not-allowed'}:{}), ...sx}}>
    {children}
  </button>
);

/* ── CONFIRM VOTE MODAL — FIX U-3 ── */
function ConfirmVoteModal({ballot,choice,onConfirm,onCancel}) {
  const yes = choice==='yes';
  return (
    <div className="modal-overlay" role="dialog" aria-modal="true" aria-label="Stimme bestätigen">
      <div className="fu w-full">
        <div className="text-5xl mb-4" aria-hidden="true">{yes?'✅':'❌'}</div>
        <h2 className="font-syne font-black text-xl mb-1" style={{color:'#f5f4f0',letterSpacing:'-.02em'}}>
          Stimme bestätigen
        </h2>
        <p className="text-sm mb-4 leading-relaxed" style={{color:'rgba(245,244,240,.45)'}}>{ballot.title}</p>
        <div className="rounded-2xl py-3 px-5 mb-4 font-syne font-black text-lg"
          style={{
            background:yes?'rgba(91,255,138,.1)':'rgba(255,91,170,.1)',
            color:yes?'#5bff8a':'#ff5baa',
            border:`1px solid ${yes?'rgba(91,255,138,.25)':'rgba(255,91,170,.25)'}`,
          }}>
          {yes?'✓ JA':'✗ NEIN'}
        </div>
        <p className="text-xs mb-5" style={{color:'rgba(245,244,240,.45)'}}>
          Diese Stimme kann nicht rückgängig gemacht werden.
        </p>
        <Btn full onClick={onConfirm} style={{marginBottom:'12px'}}>Jetzt endgültig abstimmen →</Btn>
        <button onClick={onCancel} className="press text-sm w-full py-2"
          style={{color:'rgba(245,244,240,.45)'}}>Zurück</button>
      </div>
    </div>
  );
}

/* ── VERIFY MODAL — FIX R-2 (stale closure via successRef) + FIX R-6 (semantic keys) ── */
const CORNERS = [
  {k:'tl',c:'top-2 left-2 border-t-2 border-l-2'},
  {k:'tr',c:'top-2 right-2 border-t-2 border-r-2'},
  {k:'bl',c:'bottom-2 left-2 border-b-2 border-l-2'},
  {k:'br',c:'bottom-2 right-2 border-b-2 border-r-2'},
];

function VerifyModal({onClose,onSuccess}) {
  const [step,setStep] = useState(0);
  // FIX R-2: always-fresh ref — no stale closure
  const ref = useRef(onSuccess);
  ref.current = onSuccess;

  useEffect(()=>{
    if(step===1){const t=setTimeout(()=>setStep(2),3200); return()=>clearTimeout(t);}
    if(step===2){const t=setTimeout(()=>ref.current(),1400); return()=>clearTimeout(t);}
  },[step]); // step ist die einzige dep; ref ist immer aktuell

  return (
    <div className="modal-overlay" role="dialog" aria-modal="true">
      {step===0&&(
        <div className="fu w-full">
          <div className="text-6xl mb-4" aria-hidden="true">🔐</div>
          <h2 className="font-syne font-black text-2xl mb-2" style={{color:'#f5f4f0',letterSpacing:'-.03em'}}>
            Verifizierung<br/>erforderlich
          </h2>
          <p className="text-sm leading-relaxed mb-4" style={{color:'rgba(245,244,240,.45)'}}>
            Wir prüfen deine Wahlberechtigung via eID.<br/>
            <strong style={{color:'#f5f4f0'}}>Keine persönlichen Daten werden gespeichert.</strong>
          </p>
          <div className="rounded-2xl p-4 text-left mb-5"
            style={{background:'rgba(91,255,138,.05)',border:'1px solid rgba(91,255,138,.2)'}}>
            <p className="text-xs font-syne font-bold mb-1" style={{color:'#5bff8a'}}>⚡ Zero-Knowledge-Proof</p>
            <p className="text-xs leading-relaxed" style={{color:'rgba(245,244,240,.45)'}}>
              Deine Identität wird kryptographisch bestätigt, ohne Name, Adresse oder Ausweisnummer zu persistieren.
            </p>
          </div>
          <Btn full onClick={()=>setStep(1)} style={{padding:'1rem',fontSize:'1rem',marginBottom:'12px'}}>
            📲 Mit eID verifizieren
          </Btn>
          <button onClick={onClose} className="press text-sm w-full py-2"
            style={{color:'rgba(245,244,240,.45)'}}>Abbrechen</button>
        </div>
      )}
      {step===1&&(
        <div className="fu" aria-live="polite">
          <div className="relative w-44 h-64 mx-auto mb-6 rounded-2xl overflow-hidden"
            style={{background:'#0e0e1a',border:'2px solid rgba(91,255,138,.4)'}} aria-hidden="true">
            <div className="scan"/>
            <div className="absolute inset-0 flex items-center justify-center text-5xl">🪪</div>
            {/* FIX R-6: semantic keys */}
            {CORNERS.map(({k,c})=>(
              <div key={`corner-${k}`} className={`absolute w-5 h-5 ${c}`} style={{borderColor:'#5bff8a'}}/>
            ))}
          </div>
          <p className="font-syne font-black text-xl mb-1" style={{color:'#f5f4f0'}}>Ausweis wird gelesen…</p>
          <p className="text-sm mb-4" style={{color:'rgba(245,244,240,.45)'}}>
            Halte deinen Personalausweis an die NFC-Antenne
          </p>
          <div className="flex justify-center gap-2" aria-hidden="true">
            {[0,1,2].map(i=>(
              <div key={`sd-${i}`} className="w-2 h-2 rounded-full dot-pulse"
                style={{background:'#5bff8a',animationDelay:`${i*.4}s`}}/>
            ))}
          </div>
        </div>
      )}
      {step===2&&(
        <div className="fu" aria-live="polite">
          <div className="w-20 h-20 rounded-full flex items-center justify-center text-4xl mx-auto mb-4"
            style={{background:'rgba(91,255,138,.12)',border:'2px solid rgba(91,255,138,.35)'}}>✅</div>
          <p className="font-syne font-black text-2xl mb-2" style={{color:'#f5f4f0'}}>Verifiziert!</p>
          <p className="text-sm" style={{color:'rgba(245,244,240,.45)'}}>Keine Identitätsdaten gespeichert.</p>
        </div>
      )}
    </div>
  );
}

/* ── ONBOARDING — FIX UI-4 (aria-pressed) ── */
function Onboarding({onComplete}) {
  const [step,setStep] = useState(0);
  const [sel,setSel]   = useState(new Set());
  const toggle = id => setSel(p=>{const n=new Set(p);n.has(id)?n.delete(id):n.add(id);return n;});

  if(step===0) return (
    <div className="flex flex-col items-center justify-center h-full px-6 text-center"
      style={{background:'linear-gradient(180deg,#0a0a0f 0%,#0d1a12 100%)'}}>
      <div className="mb-6 fu">
        <div className="text-7xl mb-5" role="img" aria-label="Wahlurne">🗳️</div>
        <Logo size="lg"/>
      </div>
      <h1 className="font-syne font-black text-3xl fu2 leading-tight mb-3"
        style={{color:'#f5f4f0',letterSpacing:'-.03em'}}>
        Deine Stimme.<br/><span className="grad-text">Echt einfach.</span>
      </h1>
      <p className="text-sm leading-relaxed mb-6 fu3" style={{color:'rgba(245,244,240,.45)'}}>
        Politische Bildung in 80 Wörtern.<br/>
        Abstimmungen in 90 Sekunden.<br/>
        Anonym durch Zero-Knowledge-Proof.
      </p>
      <div className="flex flex-wrap justify-center gap-2 mb-6 fu3">
        <Badge label="eIDAS-2.0 Konform"/>
        <Badge label="DSGVO · Zero PII" color="#3de8ff"/>
        <Badge label="ZKP Anonym" color="#ff5baa"/>
      </div>
      <Btn full onClick={()=>setStep(1)} style={{fontSize:'1rem',padding:'1rem'}}>Jetzt starten →</Btn>
    </div>
  );

  const ok = sel.size>=2;
  return (
    <div className="flex flex-col h-full px-5 pt-12 pb-6">
      <div className="mb-5 fu">
        <p className="text-xs font-syne font-bold tracking-widest uppercase mb-1" style={{color:'#5bff8a'}}>
          Personalisierung
        </p>
        <h2 className="font-syne font-black text-2xl" style={{color:'#f5f4f0',letterSpacing:'-.03em'}}>
          Was interessiert dich?
        </h2>
        <p className="text-sm mt-1" style={{color:'rgba(245,244,240,.45)'}}>
          Wähle mindestens 2 Themen für deinen Feed.
        </p>
      </div>
      <div className="grid grid-cols-2 gap-3 flex-1 fu2">
        {TOPICS.map(t=>{
          const on=sel.has(t.id);
          return (
            <button key={t.id} onClick={()=>toggle(t.id)}
              aria-pressed={on}
              aria-label={`Thema ${t.label} ${on?'abwählen':'auswählen'}`}
              className="press rounded-2xl p-4 text-left border transition-all duration-200"
              style={{background:on?`${t.color}18`:'#13131f',borderColor:on?`${t.color}55`:'rgba(255,255,255,.07)'}}>
              <div className="text-3xl mb-2" aria-hidden="true">{t.emoji}</div>
              <div className="font-syne font-bold text-sm" style={{color:on?t.color:'#f5f4f0'}}>{t.label}</div>
              {on&&<div className="text-xs mt-0.5 font-semibold" style={{color:`${t.color}88`}}>Ausgewählt ✓</div>}
            </button>
          );
        })}
      </div>
      <button onClick={()=>ok?onComplete([...sel]):null}
        aria-disabled={!ok}
        className="press mt-4 w-full py-4 rounded-2xl font-syne font-black text-base transition-all duration-300"
        style={{
          background:ok?'linear-gradient(135deg,#5bff8a,#3de8ff)':'rgba(255,255,255,.06)',
          color:ok?'#0a0a0f':'rgba(245,244,240,.25)',
          boxShadow:ok?'0 0 30px rgba(91,255,138,.22)':'none',
          cursor:ok?'pointer':'not-allowed',
        }}>
        {ok?`App starten (${sel.size} Themen) →`:`Noch ${2-sel.size} auswählen`}
      </button>
    </div>
  );
}

/* ── FEED — FIX R-5 (useMemo) ── */
function Feed({topics}) {
  const [filter,setFilter] = useState('all');
  // FIX R-5: memoized — nicht bei jedem render neu berechnen
  const items = useMemo(
    ()=>NEWS.filter(n=>topics.includes(n.topic)&&(filter==='all'||n.topic===filter)),
    [topics,filter]
  );

  return (
    <div className="flex flex-col h-full">
      <header className="px-5 pt-10 pb-3" style={{background:'#0a0a0f'}}>
        <Logo/>
        <p className="text-xs mt-0.5 font-syne tracking-widest uppercase"
          style={{color:'rgba(245,244,240,.25)'}}>Dein Feed · Kein Engagement-Algorithmus</p>
      </header>
      <nav aria-label="Themen-Filter" className="flex gap-2 px-5 pb-3 overflow-x-auto"
        style={{scrollbarWidth:'none'}}>
        {['all',...topics].map(id=>{
          const t=T[id]; const color=id==='all'?'#5bff8a':t?.color; const active=filter===id;
          return (
            <button key={id} onClick={()=>setFilter(id)}
              aria-pressed={active}
              aria-label={id==='all'?'Alle Themen':t?.label}
              className="press flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-syne font-semibold border transition-all duration-200"
              style={{
                color:active?color:'rgba(245,244,240,.35)',
                background:active?`${color}18`:'rgba(255,255,255,.03)',
                borderColor:active?`${color}50`:'rgba(255,255,255,.08)',
              }}>
              {id==='all'?'Alle':`${t?.emoji} ${t?.label}`}
            </button>
          );
        })}
      </nav>
      <main className="flex-1 scrollable px-5 pb-24 space-y-3">
        {items.length===0?(
          <div className="flex flex-col items-center justify-center h-32 text-center">
            <div className="text-3xl mb-2" aria-hidden="true">📭</div>
            <p className="text-sm" style={{color:'rgba(245,244,240,.45)'}}>Keine Artikel für dieses Thema</p>
          </div>
        ):items.map((a,i)=>{
          const t=T[a.topic];
          return (
            <article key={a.id} className="card p-4 fu" style={{animationDelay:`${i*.05}s`}}>
              <div className="flex items-center gap-2 mb-2 flex-wrap">
                <span className="text-xs font-syne font-bold px-2 py-0.5 rounded-full"
                  style={{background:`${t.color}20`,color:t.color}}>{t.emoji} {t.label}</span>
                {a.isNew&&<span className="text-xs font-syne font-bold px-2 py-0.5 rounded-full"
                  style={{background:'rgba(255,91,170,.15)',color:'#ff5baa'}}>NEU</span>}
                <time className="ml-auto text-xs" style={{color:'rgba(245,244,240,.28)'}}>{a.time}</time>
              </div>
              <h2 className="font-syne font-bold text-sm leading-snug mb-1" style={{color:'#f5f4f0'}}>{a.title}</h2>
              <p className="text-xs leading-relaxed" style={{color:'rgba(245,244,240,.45)'}}>{a.summary}</p>
              <footer className="mt-2 flex justify-between items-center">
                <span className="text-xs" style={{color:'rgba(245,244,240,.25)'}}>{a.source}</span>
                <button className="press text-xs font-syne font-semibold" style={{color:t.color}}>
                  Mehr lesen →
                </button>
              </footer>
            </article>
          );
        })}
      </main>
    </div>
  );
}

/* ── ENTDECKEN ── */
function Entdecken() {
  const [idx,setIdx]     = useState(0);
  const [fading,setFad]  = useState(false);
  const [dir,setDir]     = useState(0);

  const go = useCallback(d=>{
    if(fading) return;
    setDir(d);setFad(true);
    setTimeout(()=>{setIdx(i=>(i+1)%PARTY_CARDS.length);setFad(false);setDir(0);},280);
  },[fading]);

  const c=PARTY_CARDS[idx];
  const sc=c.score>=70?'#5bff8a':c.score>=50?'#ffcc44':'#ff5baa';

  return (
    <div className="flex flex-col h-full">
      <header className="px-5 pt-10 pb-4">
        <p className="text-xs font-syne font-bold tracking-widest uppercase mb-1" style={{color:'#3de8ff'}}>
          Entdecken
        </p>
        <h1 className="font-syne font-black text-xl" style={{color:'#f5f4f0',letterSpacing:'-.02em'}}>
          Wer steht wofür?
        </h1>
        <p className="text-xs mt-1" style={{color:'rgba(245,244,240,.45)'}}>
          Nur Abstimmungsverhalten — keine redaktionellen Meinungen.
        </p>
      </header>
      <main className="flex-1 px-5 flex flex-col justify-center pb-28">
        <div role="region" aria-label={`Parteikarte ${idx+1} von ${PARTY_CARDS.length}: ${c.party}`}
          className="card p-5 transition-all duration-280"
          style={{
            opacity:fading?0:1,
            transform:fading?(dir>0?'translateX(50px) rotate(3deg)':'translateX(-50px) rotate(-3deg)'):'none',
          }}>
          <div className="flex items-center gap-3 mb-4">
            <div className="w-11 h-11 rounded-xl flex items-center justify-center font-syne font-black text-sm"
              style={{background:c.bg,color:c.fg}} aria-hidden="true">{c.party.slice(0,2)}</div>
            <div>
              <div className="font-syne font-black text-sm" style={{color:'#f5f4f0'}}>{c.party}</div>
              <div className="text-xs" style={{color:'rgba(245,244,240,.45)'}}>Thema: {c.topic}</div>
            </div>
            <div className="ml-auto text-right">
              <div className="font-syne font-black text-xl" style={{color:sc}}>{c.score}</div>
              <div className="text-xs" style={{color:'rgba(245,244,240,.45)'}}>Score</div>
            </div>
          </div>
          <div className="h-1.5 rounded-full mb-4" role="progressbar"
            aria-valuenow={c.score} aria-valuemin={0} aria-valuemax={100}
            style={{background:'rgba(255,255,255,.07)'}}>
            <div className="h-full rounded-full transition-all duration-500"
              style={{width:`${c.score}%`,background:sc}}/>
          </div>
          <p className="text-sm leading-relaxed" style={{color:'rgba(245,244,240,.7)'}}>{c.pos}</p>
          <div className="flex justify-center gap-1 mt-5">
            {PARTY_CARDS.map((_,i)=>(
              <div key={`dot-pc-${i}`} className="h-1 rounded-full transition-all duration-200"
                style={{width:i===idx?'18px':'6px',background:i===idx?'#5bff8a':'rgba(255,255,255,.15)'}}/>
            ))}
          </div>
        </div>
        <div className="flex gap-3 mt-4">
          <Btn full variant="danger"  onClick={()=>go(-1)}>← Überspringen</Btn>
          <Btn full variant="success" onClick={()=>go(1)}>Nächste →</Btn>
        </div>
        <p className="text-center text-xs mt-3" style={{color:'rgba(245,244,240,.45)'}}>
          {idx+1} / {PARTY_CARDS.length} Karten
        </p>
      </main>
    </div>
  );
}

/* ── ABSTIMMEN — FIX U-3 (ConfirmModal) + FIX R-3+R-4 (votes Record) ── */
function Abstimmen({verified,setVerified,votes,onCastVote}) {
  const [showVerify,  setShowVerify]  = useState(false);
  const [confirmData, setConfirmData] = useState(null); // {ballot,choice}
  const pendingRef = useRef(null);

  const handleIntent = useCallback((ballot,choice)=>{
    if(!verified){ pendingRef.current={ballot,choice}; setShowVerify(true); }
    else setConfirmData({ballot,choice});
  },[verified]);

  const handleVerifySuccess = useCallback(()=>{
    setVerified(true); setShowVerify(false);
    if(pendingRef.current){ setConfirmData(pendingRef.current); pendingRef.current=null; }
  },[setVerified]);

  const handleConfirm = ()=>{
    if(!confirmData) return;
    onCastVote(confirmData.ballot.id, confirmData.choice);
    setConfirmData(null);
  };

  return (
    <div className="flex flex-col h-full">
      {showVerify&&(
        <VerifyModal
          onClose={()=>{setShowVerify(false);pendingRef.current=null;}}
          onSuccess={handleVerifySuccess}
        />
      )}
      {confirmData&&(
        <ConfirmVoteModal
          ballot={confirmData.ballot} choice={confirmData.choice}
          onConfirm={handleConfirm} onCancel={()=>setConfirmData(null)}
        />
      )}
      <header className="px-5 pt-10 pb-4 flex items-start justify-between">
        <div>
          <p className="text-xs font-syne font-bold tracking-widest uppercase mb-1" style={{color:'#ff5baa'}}>
            Abstimmen
          </p>
          <h1 className="font-syne font-black text-xl" style={{color:'#f5f4f0',letterSpacing:'-.02em'}}>
            Aktive Abstimmungen
          </h1>
        </div>
        <div className="flex items-center gap-1.5 px-3 py-1.5 rounded-full mt-1"
          style={verified
            ?{background:'rgba(91,255,138,.1)',border:'1px solid rgba(91,255,138,.3)'}
            :{background:'rgba(255,204,68,.1)', border:'1px solid rgba(255,204,68,.3)'}}>
          <div className="w-1.5 h-1.5 rounded-full dot-pulse"
            style={{background:verified?'#5bff8a':'#ffcc44'}}/>
          <span className="text-xs font-syne font-bold" style={{color:verified?'#5bff8a':'#ffcc44'}}>
            {verified?'Verifiziert':'Nicht verifiziert'}
          </span>
        </div>
      </header>
      <main className="flex-1 scrollable px-5 pb-24 space-y-4">
        {BALLOTS.map((b,i)=>{
          const hasVoted = b.id in votes;           // FIX R-3+R-4
          const myChoice = votes[b.id];
          const yesTotal = b.yes+(myChoice==='yes'?1:0);
          const total    = b.yes+b.no+(hasVoted?1:0);
          const yp       = Math.round((yesTotal/total)*100);
          return (
            <article key={b.id} className="rounded-3xl overflow-hidden fu"
              style={{
                background:'#13131f',
                border:`1px solid ${hasVoted?b.color+'45':'rgba(255,255,255,.07)'}`,
                animationDelay:`${i*.08}s`,
              }}>
              <div className="p-4 pb-2">
                <div className="flex items-center gap-2 mb-2 flex-wrap">
                  <span className="text-xs font-syne font-bold px-2 py-0.5 rounded-full"
                    style={{background:`${b.color}20`,color:b.color}}>{b.emoji} {b.region}</span>
                  <time className="ml-auto text-xs" style={{color:'rgba(245,244,240,.28)'}}>bis {b.end}</time>
                </div>
                <h2 className="font-syne font-black text-sm leading-snug mb-1" style={{color:'#f5f4f0'}}>{b.title}</h2>
                <p className="text-xs leading-relaxed" style={{color:'rgba(245,244,240,.45)'}}>{b.question}</p>
              </div>
              <div className="px-4 pb-3">
                <div className="flex h-1.5 rounded-full overflow-hidden mb-1.5"
                  role="meter" aria-valuenow={yp} aria-valuemin={0} aria-valuemax={100}
                  aria-label={`${yp}% Ja, ${100-yp}% Nein`}
                  style={{background:'rgba(255,255,255,.06)'}}>
                  <div style={{width:`${yp}%`,background:'#5bff8a',transition:'width .5s ease'}}/>
                  <div style={{flex:1,background:'#ff5baa'}}/>
                </div>
                <div className="flex justify-between text-xs">
                  <span style={{color:'#5bff8a',fontWeight:600}}>{yp}% Ja</span>
                  <span style={{color:'rgba(245,244,240,.3)'}}>{(b.yes+b.no).toLocaleString('de-DE')} Stimmen</span>
                  <span style={{color:'#ff5baa',fontWeight:600}}>{100-yp}% Nein</span>
                </div>
              </div>
              <div className="px-4 pb-4">
                {hasVoted?(
                  <div className="text-center py-2 rounded-xl text-xs font-syne font-bold"
                    style={{background:`${b.color}12`,color:b.color,border:`1px solid ${b.color}30`}}>
                    ✓ Du hast mit <strong>{myChoice==='yes'?'JA':'NEIN'}</strong> gestimmt
                  </div>
                ):(
                  <div className="grid grid-cols-2 gap-2">
                    <Btn variant="success" onClick={()=>handleIntent(b,'yes')}>✓ Ja</Btn>
                    <Btn variant="danger"  onClick={()=>handleIntent(b,'no')}>✗ Nein</Btn>
                  </div>
                )}
              </div>
            </article>
          );
        })}
      </main>
    </div>
  );
}

/* ── PROFIL — FIX UI-5 (ring animation) + vote history ── */
function Profil({topics,votes}) {
  // FIX UI-5: mounted-State triggert Ring-Animation
  const [mounted,setMounted] = useState(false);
  useEffect(()=>{const t=setTimeout(()=>setMounted(true),80);return()=>clearTimeout(t);},[]);

  const votedCount = Object.keys(votes).length;
  const score      = useMemo(()=>Math.min(100,votedCount*28+topics.length*8+5),[votedCount,topics.length]);
  const circ       = 2*Math.PI*24;
  const dash       = mounted ? circ*score/100 : 0;  // animiert beim ersten Render
  const myBallots  = BALLOTS.filter(b=>b.id in votes);

  const label = score===0?'Starte jetzt!':score<40?'Gut angefangen!':score<70?'Aktiv dabei 🌿':'Demokrat des Jahres 🏆';

  return (
    <div className="flex flex-col h-full">
      <header className="px-5 pt-10 pb-4">
        <p className="text-xs font-syne font-bold tracking-widest uppercase mb-1" style={{color:'#a78bfa'}}>Profil</p>
        <h1 className="font-syne font-black text-xl" style={{color:'#f5f4f0',letterSpacing:'-.02em'}}>
          Dein Civic Footprint
        </h1>
      </header>
      <main className="flex-1 scrollable px-5 pb-24 space-y-4">
        {/* Score */}
        <div className="rounded-3xl p-5"
          style={{background:'linear-gradient(160deg,#131325,#0e1a18)',border:'1px solid rgba(91,255,138,.18)'}}>
          <div className="flex items-center gap-4">
            <div className="relative w-16 h-16 flex-shrink-0">
              <svg className="w-16 h-16 -rotate-90" viewBox="0 0 60 60"
                role="img" aria-label={`Civic Score: ${score} von 100`}>
                <circle cx="30" cy="30" r="24" fill="none" stroke="rgba(255,255,255,.08)" strokeWidth="5"/>
                <circle cx="30" cy="30" r="24" fill="none" stroke="#5bff8a" strokeWidth="5"
                  strokeDasharray={`${dash} ${circ-dash}`} strokeLinecap="round"
                  style={{transition:'stroke-dasharray .6s ease'}}/>
              </svg>
              <div className="absolute inset-0 flex items-center justify-center font-syne font-black text-sm"
                style={{color:'#5bff8a'}} aria-hidden="true">{score}</div>
            </div>
            <div>
              <div className="font-syne font-black text-lg" style={{color:'#f5f4f0'}}>Civic Score</div>
              <div className="text-xs" style={{color:'rgba(245,244,240,.45)'}}>
                {votedCount} Abstimmung{votedCount!==1?'en':''} · {topics.length} Themen
              </div>
              <div className="text-xs mt-1 font-semibold" style={{color:'#5bff8a'}}>{label}</div>
            </div>
          </div>
        </div>

        {/* My Topics */}
        <section className="card p-4" aria-labelledby="th">
          <p id="th" className="text-xs font-syne font-bold tracking-widest uppercase mb-3"
            style={{color:'rgba(245,244,240,.45)'}}>Meine Themen</p>
          <div className="flex flex-wrap gap-2">
            {topics.map(id=>{const t=T[id];return t?(
              <span key={id} className="px-3 py-1.5 rounded-full text-xs font-syne font-bold"
                style={{background:`${t.color}15`,color:t.color,border:`1px solid ${t.color}35`}}>
                {t.emoji} {t.label}
              </span>
            ):null;})}
          </div>
        </section>

        {/* Vote History */}
        <section className="card p-4" aria-labelledby="vh">
          <p id="vh" className="text-xs font-syne font-bold tracking-widest uppercase mb-3"
            style={{color:'rgba(245,244,240,.45)'}}>Meine Abstimmungen</p>
          {myBallots.length===0
            ?<p className="text-xs" style={{color:'rgba(245,244,240,.45)'}}>Noch keine Abstimmungen abgegeben.</p>
            :myBallots.map(b=>(
              <div key={b.id} className="flex justify-between items-center py-2.5 border-b last:border-0"
                style={{borderColor:'rgba(255,255,255,.05)'}}>
                <span className="text-xs pr-2 leading-snug" style={{color:'rgba(245,244,240,.45)'}}>{b.title}</span>
                <span className="text-xs font-syne font-bold flex-shrink-0"
                  style={{color:votes[b.id]==='yes'?'#5bff8a':'#ff5baa'}}>
                  {votes[b.id]==='yes'?'✓ JA':'✗ NEIN'}
                </span>
              </div>
            ))
          }
        </section>

        {/* Datentransparenz */}
        <section className="card p-4" aria-labelledby="dh">
          <p id="dh" className="text-xs font-syne font-bold tracking-widest uppercase mb-3"
            style={{color:'rgba(245,244,240,.45)'}}>Datentransparenz</p>
          {[
            {l:'Abstimmungsdaten',      v:'Keine (ZKP)',         c:'#5bff8a'},
            {l:'Persönliche ID-Daten',   v:'Nicht gespeichert',  c:'#5bff8a'},
            {l:'Analytics',              v:'Anonym, aggregiert', c:'#3de8ff'},
            {l:'Drittanbieter-Tracking', v:'Keines',             c:'#5bff8a'},
          ].map(r=>(
            <div key={r.l} className="flex justify-between items-center py-2.5 border-b last:border-0"
              style={{borderColor:'rgba(255,255,255,.05)'}}>
              <span className="text-xs" style={{color:'rgba(245,244,240,.45)'}}>{r.l}</span>
              <span className="text-xs font-syne font-bold" style={{color:r.c}}>{r.v}</span>
            </div>
          ))}
        </section>

        <div className="flex flex-wrap gap-2 pb-1">
          {[['eIDAS-2.0','#5bff8a'],['DSGVO-Konform','#3de8ff'],['ZKP Anonym','#ff5baa'],['Open Source','#ffcc44']]
            .map(([l,c])=><Badge key={l} label={l} color={c}/>)}
        </div>
        <p className="text-xs text-center pb-2" style={{color:'rgba(245,244,240,.18)'}}>
          VoteUp v1.0 · Strikt überparteilich · © 2026 VoteUp GmbH i.Gr.
        </p>
      </main>
    </div>
  );
}

/* ── TAB BAR — FIX UI-4 (aria-label + aria-current) ── */
function TabBar({tab,setTab,totalVotes}) {
  const unvoted = BALLOTS.length-totalVotes;
  const tabs = [
    {id:'feed',      emoji:'🏠',label:'Feed'},
    {id:'entdecken', emoji:'🔍',label:'Entdecken'},
    {id:'abstimmen', emoji:'🗳️',label:'Abstimmen',badge:unvoted},
    {id:'profil',    emoji:'👤',label:'Profil'},
  ];
  return (
    <nav className="tab-bar" aria-label="Haupt-Navigation"
      style={{paddingBottom:'env(safe-area-inset-bottom,6px)'}}>
      {tabs.map(t=>{
        const active=tab===t.id;
        return (
          <button key={t.id} onClick={()=>setTab(t.id)}
            aria-current={active?'page':undefined}
            aria-label={`${t.label}${t.badge>0?`, ${t.badge} ausstehend`:''}`}
            className="press flex-1 flex flex-col items-center gap-0.5 py-2.5 relative"
            style={{color:active?'#5bff8a':'rgba(245,244,240,.28)'}}>
            {active&&<div className="absolute top-0 left-1/2 -translate-x-1/2 w-6 h-0.5 rounded-full"
              style={{background:'#5bff8a'}} aria-hidden="true"/>}
            <div className="relative">
              <span className="text-xl leading-none" aria-hidden="true">{t.emoji}</span>
              {t.badge>0&&(
                <span className="absolute -top-1 -right-2 w-4 h-4 rounded-full flex items-center justify-center font-syne font-black"
                  style={{background:'#ff5baa',color:'#fff',fontSize:'.55rem'}} aria-hidden="true">
                  {t.badge}
                </span>
              )}
            </div>
            <span className="font-syne font-semibold" aria-hidden="true"
              style={{fontSize:'.58rem',letterSpacing:'.06em'}}>{t.label}</span>
          </button>
        );
      })}
    </nav>
  );
}

/* ── APP — FIX R-3+R-4 (unified votes Record) ── */
function App() {
  const [screen,   setScreen]   = useState('onboarding');
  const [topics,   setTopics]   = useState([]);
  const [tab,      setTab]      = useState('feed');
  const [verified, setVerified] = useState(false);
  // FIX R-3+R-4: ein einziger Record ersetzt Set + getrenntes choices-Objekt
  const [votes, setVotes] = useState({});

  const handleComplete = useCallback(t=>{setTopics(t);setScreen('app');},[]);
  const handleCastVote = useCallback((id,choice)=>setVotes(p=>({...p,[id]:choice})),[]);

  if(screen==='onboarding') return <Onboarding onComplete={handleComplete}/>;

  return (
    <div style={{height:'100vh',overflow:'hidden',background:'#0a0a0f',position:'relative'}}>
      <div style={{height:'100%',overflow:'hidden'}}>
        {tab==='feed'      &&<Feed topics={topics}/>}
        {tab==='entdecken' &&<Entdecken/>}
        {tab==='abstimmen' &&(
          <Abstimmen
            verified={verified} setVerified={setVerified}
            votes={votes} onCastVote={handleCastVote}
          />
        )}
        {tab==='profil' &&<Profil topics={topics} votes={votes}/>}
      </div>
      <TabBar tab={tab} setTab={setTab} totalVotes={Object.keys(votes).length}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
